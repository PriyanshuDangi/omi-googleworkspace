<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Account Connected</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: #111111;
        border: 1px solid #262626;
        border-radius: 16px;
        padding: 32px;
        text-align: center;
      }
      .check {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        margin: 0 auto 16px;
        display: grid;
        place-items: center;
        font-size: 28px;
        background: #14532d;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0;
        color: #d4d4d4;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="check">✓</div>
      <h1>Google Account Connected!</h1>
      <p>
        You are all set. You can now use Gmail and Calendar from Omi chat.
        You can close this page.
      </p>
    </main>
  </body>
</html>
